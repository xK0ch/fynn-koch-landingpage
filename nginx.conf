events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # HTTP: certbot webroot challenge zuerst, dann redirect
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Landing Page: fynn-koch.de
    server {
        listen 443 ssl;
        server_name fynn-koch.de;

        # Zertifikat-Pfad nach "certbot --manual ... -d fynn-koch.de -d dance-school.fynn-koch.de -d shikaku.fynn-koch.de"
        # Pfad pruefen mit: ls /etc/letsencrypt/live/
        ssl_certificate     /etc/letsencrypt/live/fynn-koch.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fynn-koch.de/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        root  /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_vary on;
        gzip_min_length 256;
        gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Dance School: dance-school.fynn-koch.de
    server {
        listen 443 ssl;
        server_name dance-school.fynn-koch.de;

        ssl_certificate     /etc/letsencrypt/live/fynn-koch.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fynn-koch.de/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            resolver 127.0.0.11 valid=30s;
            set $upstream http://dance-school-ui;
            proxy_pass         $upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Tanzschule Family & Friends: tsfaf.fynn-koch.de
    server {
        listen 443 ssl;
        server_name tsfaf.fynn-koch.de;

        ssl_certificate     /etc/letsencrypt/live/fynn-koch.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fynn-koch.de/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            resolver 127.0.0.11 valid=30s;
            set $upstream http://tsfaf-ui;
            proxy_pass         $upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Shikaku: shikaku.fynn-koch.de
    server {
        listen 443 ssl;
        server_name shikaku.fynn-koch.de;

        ssl_certificate     /etc/letsencrypt/live/fynn-koch.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fynn-koch.de/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            resolver 127.0.0.11 valid=30s;
            set $upstream http://shikaku;
            proxy_pass         $upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # Weiteres Projekt: einfach neuen server-Block hier einfuegen
    #
    # server {
    #     listen 443 ssl;
    #     server_name meinprojekt.fynn-koch.de;
